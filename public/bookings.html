<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings - Garage Legends</title>
  <meta name="description" content="View and manage your test drive bookings.">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="ambient-scene">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo" style="text-decoration:none;">
        <span class="logo-accent">GARAGE</span> LEGENDS
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Showroom</a></li>
        <li><a href="bookings.html" class="active">My Bookings</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li>
          <div class="nav-auth" id="navAuth">
            <a href="login.html" class="btn-nav btn-nav-outline">Log In</a>
            <a href="signup.html" class="btn-nav btn-nav-filled">Sign Up</a>
          </div>
        </li>
      </ul>
    </div>
  </nav>

  <div class="bookings-page">
    <h1 class="reveal active">MY <span style="color: var(--accent);">BOOKINGS</span></h1>
    <p class="page-subtitle reveal active">Your scheduled test drive experiences.</p>

    <div id="bookingsContainer" class="bookings-grid">
      <!-- Populated by JS -->
    </div>

    <div id="emptyBookings" class="empty-state hidden">
      <div class="empty-icon">🏎️</div>
      <h3>No Bookings Yet</h3>
      <p>Head to the showroom and book your dream test drive.</p>
      <a href="index.html" class="btn-primary">Explore Showroom</a>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Garage Legends. Premium Automotive.</p>
  </footer>

  <script src="script.js"></script>

</html>
