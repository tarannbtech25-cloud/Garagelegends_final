<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - Garage Legends</title>
  <meta name="description" content="Log in to your Garage Legends account.">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="ambient-scene">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo" style="text-decoration:none;">
        <span class="logo-accent">GARAGE</span> LEGENDS
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Showroom</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li>
          <div class="nav-auth" id="navAuth">
            <a href="login.html" class="btn-nav btn-nav-outline">Log In</a>
            <a href="signup.html" class="btn-nav btn-nav-filled">Sign Up</a>
          </div>
        </li>
      </ul>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card reveal active">
      <h2>WELCOME <span style="color: var(--accent);">BACK</span></h2>
      <p class="auth-subtitle">Enter your credentials to access the garage.</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" name="email" placeholder="" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="password-wrapper">
            <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required>
            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">👁</button>
          </div>
        </div>
        <button type="submit" id="loginBtn" class="btn-primary" style="width: 100%;">Engage</button>
        <div id="loginStatus" class="form-status"></div>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
